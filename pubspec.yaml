name: linguaverse
description: Language Learning Companion — Mobile & AR Metaverse
publish_to: none
version: 1.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  shared_preferences: ^2.2.3

  firebase_core: ^3.3.0
  firebase_auth: ^5.1.0
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.1.0
  firebase_database: ^11.0.0

  sqflite: ^2.3.3
  path: ^1.9.0
  flutter_secure_storage: ^9.2.2

  flutter_tts: ^4.2.0
  speech_to_text: ^7.0.0
  audioplayers: ^6.1.0

  ar_flutter_plugin: ^0.7.3
  google_mlkit_object_detection: ^0.12.0
  google_mlkit_text_recognition: ^0.13.0

  fl_chart: ^0.69.0
  lottie: ^3.1.2
  file_picker: ^8.1.2
  geolocator: ^9.0.2
  camera: ^0.10.5+9

  dio: ^5.7.0
  flutter_dotenv: ^5.1.0
  permission_handler: ^10.4.5
  google_generative_ai: ^0.4.3

  crypto: any
  uuid: ^4.5.3
  sqflite_common_ffi: any
  google_mlkit_image_labeling: ^0.12.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/animations/
    - assets/audio/arabic/

dependency_overrides:
  permission_handler: ^11.3.1
